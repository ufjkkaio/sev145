<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="棚清掃">
  <meta name="theme-color" content="#1a5f2a">
  <title>棚清掃</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  <link rel="stylesheet" href="../css/app.css?v=59">
  <link rel="stylesheet" href="css/simple.css?v=59">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header__lead">
        <button type="button" id="btn-store-name" class="header__store-btn" aria-label="店舗名を変更">
          <span id="header-store-name" class="header__store-name">店舗名</span>
        </button>
        <h1 class="header__title">棚清掃 <span id="app-version" class="app-version"></span></h1>
      </div>
      <div class="header__actions">
        <button type="button" id="btn-store-switch" class="btn btn--ghost">店舗</button>
        <button type="button" id="btn-layout-edit" class="btn btn--ghost" aria-pressed="false">レイアウト</button>
        <button type="button" id="btn-edit-mode" class="btn btn--ghost" aria-pressed="false">名称編集</button>
        <button type="button" id="btn-reset" class="btn btn--header-reset">リセット</button>
      </div>
    </header>

    <main class="map-area map-area--whiteboard" id="map-area">
      <div id="board-transform" class="board-transform">
        <div id="board-canvas" class="board-canvas"></div>
      </div>
      <button type="button" id="btn-add-shelf" class="fab-add-shelf" hidden>棚を追加</button>
      <div class="zoom-controls" id="zoom-controls">
        <button type="button" id="btn-zoom-out" class="zoom-controls__btn" aria-label="縮小">−</button>
        <span id="zoom-label" class="zoom-controls__label">100%</span>
        <button type="button" id="btn-zoom-in" class="zoom-controls__btn" aria-label="拡大">＋</button>
        <button type="button" id="btn-center" class="zoom-controls__btn zoom-controls__btn--center" aria-label="中央に戻る">中央</button>
      </div>
    </main>

    <div id="edit-hint" class="edit-hint" hidden>棚をタップして名称を変更</div>
    <div id="layout-hint" class="edit-hint" hidden>2本指で拡大・移動／空きをドラッグでパン／棚タップで削除／スワイプで伸ばす</div>

    <div id="folder-overlay" class="folder-overlay" hidden>
      <div class="folder" role="dialog" aria-labelledby="folder-title">
        <div class="folder__header">
          <button type="button" id="btn-folder-back" class="btn btn--icon" aria-label="戻る">←</button>
          <div class="folder__title-wrap">
            <h2 id="folder-title" class="folder__title"></h2>
          </div>
          <button type="button" id="btn-rename-shelf" class="btn btn--ghost btn--sm">名称変更</button>
        </div>
        <div class="folder__status">
          <label class="check-complete">
            <input type="checkbox" id="shelf-checked">
            <span class="check-complete__box"></span>
            <span class="check-complete__label">清掃完了</span>
          </label>
        </div>
        <div class="folder__content">
          <div id="photo-grid" class="photo-grid"></div>
          <div class="photo-add-row">
            <label class="photo-add">
              <input type="file" id="photo-input-camera" accept="image/*" capture="environment" hidden>
              <span class="photo-add__inner">
                <span class="photo-add__icon">📷</span>
                <span class="photo-add__text">撮影する</span>
              </span>
            </label>
            <label class="photo-add">
              <input type="file" id="photo-input-album" accept="image/*" hidden>
              <span class="photo-add__inner">
                <span class="photo-add__icon">🖼️</span>
                <span class="photo-add__text">アルバムから</span>
              </span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div id="name-dialog" class="dialog-overlay" hidden>
      <div class="dialog" role="dialog" aria-labelledby="name-dialog-title">
        <h3 id="name-dialog-title" class="dialog__title">棚の名称</h3>
        <input type="text" id="shelf-name-input" class="dialog__input" placeholder="例：冷蔵ケース1" maxlength="30" autocomplete="off">
        <div class="dialog__actions">
          <button type="button" id="btn-name-cancel" class="btn btn--ghost">キャンセル</button>
          <button type="button" id="btn-name-ok" class="btn btn--primary">OK</button>
        </div>
      </div>
    </div>

    <div id="delete-shelf-dialog" class="dialog-overlay" hidden>
      <div class="dialog" role="dialog">
        <h3 class="dialog__title">この棚を削除しますか？</h3>
        <p class="dialog__message">棚の写真もすべて削除されます。</p>
        <div class="dialog__actions">
          <button type="button" id="btn-delete-shelf-cancel" class="btn btn--ghost">キャンセル</button>
          <button type="button" id="btn-delete-shelf-ok" class="btn btn--danger">削除</button>
        </div>
      </div>
    </div>

    <div id="reset-dialog" class="dialog-overlay" hidden>
      <div class="dialog" role="dialog">
        <h3 class="dialog__title">すべてリセットしますか？</h3>
        <p class="dialog__message">すべての写真と清掃完了のチェックが削除されます。この操作は元に戻せません。</p>
        <div class="dialog__actions">
          <button type="button" id="btn-reset-cancel" class="btn btn--ghost">キャンセル</button>
          <button type="button" id="btn-reset-ok" class="btn btn--danger">リセット</button>
        </div>
      </div>
    </div>

    <div id="auth-gate" class="auth-gate" hidden>
      <div class="auth-gate__card">
        <h2 class="auth-gate__title">棚清掃</h2>
        <p id="auth-error" class="auth-gate__error" hidden></p>

        <div id="auth-panel-home" class="auth-panel">
          <button type="button" id="btn-auth-login" class="btn btn--primary auth-gate__btn">店舗に入る</button>
          <button type="button" id="btn-auth-register" class="btn btn--ghost auth-gate__btn">新しい店舗を作る</button>
          <button type="button" id="btn-auth-qr" class="btn btn--ghost auth-gate__btn">QRで入る</button>
        </div>

        <div id="auth-panel-login" class="auth-panel" hidden>
          <label class="auth-gate__label">店番号（6桁）</label>
          <input type="text" id="auth-login-number" class="dialog__input" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="off" placeholder="123456">
          <label class="auth-gate__label">合言葉</label>
          <input type="text" id="auth-login-pass" class="dialog__input" autocomplete="off" placeholder="合言葉">
          <div class="dialog__actions">
            <button type="button" id="btn-auth-login-back" class="btn btn--ghost">戻る</button>
            <button type="button" id="btn-auth-login-go" class="btn btn--primary">入る</button>
          </div>
        </div>

        <div id="auth-panel-register" class="auth-panel" hidden>
          <label class="auth-gate__label">店番号（6桁）</label>
          <input type="text" id="auth-reg-number" class="dialog__input" inputmode="numeric" maxlength="6" autocomplete="off" placeholder="123456">
          <label class="auth-gate__label">店舗名（表示用）</label>
          <input type="text" id="auth-reg-name" class="dialog__input" maxlength="20" autocomplete="off" placeholder="例：〇〇店">
          <div class="dialog__actions">
            <button type="button" id="btn-auth-reg-back" class="btn btn--ghost">戻る</button>
            <button type="button" id="btn-auth-reg-go" class="btn btn--primary">作成</button>
          </div>
        </div>

        <div id="auth-panel-qr" class="auth-panel" hidden>
          <p class="auth-gate__hint">QRコードの画像を選ぶか、カメラで読み取ってください</p>
          <input type="file" id="auth-qr-file" accept="image/*" hidden>
          <button type="button" id="btn-auth-qr-pick" class="btn btn--ghost auth-gate__btn">QR画像を選ぶ</button>
          <div class="dialog__actions">
            <button type="button" id="btn-auth-qr-back" class="btn btn--ghost">戻る</button>
          </div>
        </div>

        <div id="auth-panel-created" class="auth-panel" hidden>
          <p class="auth-gate__hint">以下をメモするか、QRを保存してください（再表示できません）</p>
          <p class="auth-created__row"><strong>店番号</strong> <span id="auth-created-number"></span></p>
          <p class="auth-created__row"><strong>合言葉</strong> <span id="auth-created-pass"></span></p>
          <canvas id="auth-created-qr" class="auth-created__qr"></canvas>
          <button type="button" id="btn-auth-created-go" class="btn btn--primary auth-gate__btn">はじめる</button>
        </div>
      </div>
    </div>

    <div id="store-switch-dialog" class="dialog-overlay" hidden>
      <div class="dialog" role="dialog">
        <h3 class="dialog__title">店舗を切り替え</h3>
        <div id="store-switch-list" class="store-switch-list"></div>
        <button type="button" id="btn-store-switch-add" class="btn btn--ghost auth-gate__btn">店舗を追加</button>
        <div class="dialog__actions">
          <button type="button" id="btn-store-switch-close" class="btn btn--ghost">閉じる</button>
        </div>
      </div>
    </div>

    <div id="photo-viewer" class="photo-viewer" hidden>
      <div class="photo-viewer__inner">
        <button type="button" id="btn-viewer-close" class="photo-viewer__close" aria-label="閉じる">×</button>
        <img id="viewer-image" class="photo-viewer__image" alt="">
        <div class="photo-viewer__meta">
          <label class="photo-viewer__label" for="viewer-author-input">撮影者</label>
          <input type="text" id="viewer-author-input" class="photo-viewer__author-input" placeholder="シフト　名前" maxlength="10" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="done">
          <button type="button" id="btn-viewer-save-author" class="btn btn--primary photo-viewer__save-btn">名前を保存</button>
        </div>
        <div class="photo-viewer__actions">
          <button type="button" id="btn-viewer-edit" class="btn btn--ghost photo-viewer__edit-btn">写真に書き込む</button>
          <button type="button" id="btn-viewer-delete" class="btn btn--danger photo-viewer__delete-btn">この写真を削除</button>
        </div>
        <div id="photo-delete-confirm" class="photo-viewer__confirm" hidden>
          <p class="photo-viewer__confirm-text">この写真を削除しますか？</p>
          <div class="photo-viewer__confirm-actions">
            <button type="button" id="btn-viewer-delete-cancel" class="btn btn--ghost photo-viewer__confirm-btn">キャンセル</button>
            <button type="button" id="btn-viewer-delete-ok" class="btn btn--danger photo-viewer__confirm-btn">削除する</button>
          </div>
        </div>
      </div>
    </div>

    <div id="photo-editor" class="photo-editor" hidden>
      <div class="photo-editor__bar">
        <button type="button" id="btn-editor-back" class="btn btn--ghost btn--sm">戻る</button>
        <div class="photo-editor__title">ペンで書き込み</div>
        <button type="button" id="btn-editor-save" class="btn btn--primary btn--sm">保存</button>
      </div>
      <div class="photo-editor__stage">
        <canvas id="editor-canvas" class="photo-editor__canvas"></canvas>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="../js/firebase-config.js?v=59"></script>
  <script src="../js/firebase-boot.js?v=59"></script>
  <script src="../js/cloud-auth.js?v=59"></script>
  <script src="../js/cloud-db.js?v=59"></script>
  <script src="../js/qr-render.js?v=59"></script>
  <script src="js/db.js?v=59"></script>
  <script src="js/app.js?v=59"></script>
</body>
</html>
