<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="棚清掃">
  <meta name="theme-color" content="#1a5f2a">
  <title>店内棚 清掃管理</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css?v=52">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1 class="header__title">店内棚 清掃管理</h1>
      <div class="header__actions">
        <button type="button" id="btn-edit-mode" class="btn btn--ghost" aria-pressed="false">名称編集</button>
        <button type="button" id="btn-reset" class="btn btn--header-reset">リセット</button>
      </div>
    </header>

    <main class="map-area" id="map-area">
      <div id="store-layout" class="store-layout"></div>
    </main>

    <div id="edit-hint" class="edit-hint" hidden>
      棚をタップして名称を変更
    </div>

    <!-- 棚フォルダビュー -->
    <div id="folder-overlay" class="folder-overlay" hidden>
      <div class="folder" role="dialog" aria-labelledby="folder-title">
        <div class="folder__header">
          <button type="button" id="btn-folder-back" class="btn btn--icon" aria-label="戻る">←</button>
          <div class="folder__title-wrap">
            <h2 id="folder-title" class="folder__title"></h2>
          </div>
          <button type="button" id="btn-rename-shelf" class="btn btn--ghost btn--sm">名称変更</button>
        </div>

        <div class="folder__status">
          <label class="check-complete">
            <input type="checkbox" id="shelf-checked">
            <span class="check-complete__box"></span>
            <span class="check-complete__label">清掃完了</span>
          </label>
        </div>

        <div class="folder__content">
          <div id="photo-grid" class="photo-grid"></div>
          <div class="photo-add-row">
            <label class="photo-add">
              <input type="file" id="photo-input-camera" accept="image/*" capture="environment" hidden>
              <span class="photo-add__inner">
                <span class="photo-add__icon">📷</span>
                <span class="photo-add__text">撮影する</span>
              </span>
            </label>
            <label class="photo-add">
              <input type="file" id="photo-input-album" accept="image/*" hidden>
              <span class="photo-add__inner">
                <span class="photo-add__icon">🖼️</span>
                <span class="photo-add__text">アルバムから</span>
              </span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div id="name-dialog" class="dialog-overlay" hidden>
      <div class="dialog" role="dialog" aria-labelledby="name-dialog-title">
        <h3 id="name-dialog-title" class="dialog__title">棚の名称</h3>
        <input type="text" id="shelf-name-input" class="dialog__input" placeholder="例：冷蔵ケース1" maxlength="30" autocomplete="off">
        <div class="dialog__actions">
          <button type="button" id="btn-name-cancel" class="btn btn--ghost">キャンセル</button>
          <button type="button" id="btn-name-ok" class="btn btn--primary">OK</button>
        </div>
      </div>
    </div>

    <div id="reset-dialog" class="dialog-overlay" hidden>
      <div class="dialog" role="dialog">
        <h3 class="dialog__title">すべてリセットしますか？</h3>
        <p class="dialog__message">すべての写真と清掃完了のチェックが削除されます。この操作は元に戻せません。</p>
        <div class="dialog__actions">
          <button type="button" id="btn-reset-cancel" class="btn btn--ghost">キャンセル</button>
          <button type="button" id="btn-reset-ok" class="btn btn--danger">リセット</button>
        </div>
      </div>
    </div>

    <div id="photo-viewer" class="photo-viewer" hidden>
      <div class="photo-viewer__inner">
        <button type="button" id="btn-viewer-close" class="photo-viewer__close" aria-label="閉じる">×</button>
        <img id="viewer-image" class="photo-viewer__image" alt="">
        <div class="photo-viewer__meta">
          <label class="photo-viewer__label" for="viewer-author-input">撮影者</label>
          <input type="text" id="viewer-author-input" class="photo-viewer__author-input" name="shelf-photo-author" placeholder="シフト　名前" maxlength="10" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="done">
          <button type="button" id="btn-viewer-save-author" class="btn btn--primary photo-viewer__save-btn">名前を保存</button>
        </div>
        <div class="photo-viewer__actions">
          <button type="button" id="btn-viewer-edit" class="btn btn--ghost photo-viewer__edit-btn">写真に書き込む</button>
          <button type="button" id="btn-viewer-delete" class="btn btn--danger photo-viewer__delete-btn">この写真を削除</button>
        </div>
        <div id="photo-delete-confirm" class="photo-viewer__confirm" hidden>
          <p class="photo-viewer__confirm-text">この写真を削除しますか？</p>
          <div class="photo-viewer__confirm-actions">
            <button type="button" id="btn-viewer-delete-cancel" class="btn btn--ghost photo-viewer__confirm-btn">キャンセル</button>
            <button type="button" id="btn-viewer-delete-ok" class="btn btn--danger photo-viewer__confirm-btn">削除する</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 写真編集（ペンのみ） -->
    <div id="photo-editor" class="photo-editor" hidden>
      <div class="photo-editor__bar">
        <button type="button" id="btn-editor-back" class="btn btn--ghost btn--sm">戻る</button>
        <div class="photo-editor__title">ペンで書き込み</div>
        <button type="button" id="btn-editor-save" class="btn btn--primary btn--sm">保存</button>
      </div>
      <div class="photo-editor__stage">
        <canvas id="editor-canvas" class="photo-editor__canvas"></canvas>
      </div>
    </div>
  </div>

  <script src="js/layout-template.js?v=52"></script>
  <script src="js/db.js?v=52"></script>
  <script src="js/app.js?v=52"></script>
</body>
</html>
